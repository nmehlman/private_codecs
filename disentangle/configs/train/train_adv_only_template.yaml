

# Basic training configuration for Expresso with Encodec features

---
random_seed: 42
ckpt_path: "/project2/shrikann_35/nmehlman/logs/private_codecs/tensorboard/simple-ae-debug/version_0/checkpoints/epoch=199-step=37400.ckpt"
gpus: "0"
dataset_name: "expresso"
codec_name: "encodec"
input_type: "quantized_embedding"

# Dataset options:
dataset:
  dataset_path: "/project2/shrikann_35/DATA/expresso/codec_feats/"
  codec: "encodec"
  emotion_model: "wavlm"

# Dataloader options:
dataloader:
  batch_size: 64
  num_workers: 4

# Model options:
lightning:
  codec_dim: 128
  latent_dim: 64
  enc_channels: [256, 128]
  dec_channels: [256]
  emotion_dim: 256
  learning_rate: 0.0002
  adv_learning_rate: 0.002
  weight_decay: 0
  adv_annealing_steps: 20000 
  adv_loss_weight: 0.5  
  adv_update_factor: 1      
  normalize_input: true
  use_adversarial: true
  lr_scheduling: true
  gradient_clip_val: 10.0


# Training options:
trainer:
  max_epochs: 200
  val_check_interval: 1.0 
  log_every_n_steps: 10    
  sync_batchnorm: True
  accelerator: "gpu"
  devices: "auto"
  deterministic: False
  detect_anomaly: True

# Tensorboard options:
tensorboard:
  save_dir: "/project2/shrikann_35/nmehlman/logs/private_codecs/tensorboard"
  name: "adv_only" # CHANGEME
  version: null     

