

# Basic training configuration for Expresso with Hificodec features

---
random_seed: 42
ckpt_path: null
gpus: "0"
dataset_name: "expresso"
codec_name: "hificodec"
input_type: "quantized_embedding"

# Dataset options:
dataset:
  dataset_path: "/project2/shrikann_35/DATA/expresso/codec_feats/"
  codec: "hificodec"
  emotion_model: "wavlm"

# Dataloader options:
dataloader:
  batch_size: 64
  num_workers: 4

# Model options:
lightning:
  codec_dim: 512
  latent_dim: 128
  enc_channels: [256, 256]
  dec_channels: [128, 128]
  learning_rate: 0.002
  adv_learning_rate: 0.002
  weight_decay: 0
  adv_annealing_steps: 20000 
  ae_warmup_steps: 5000   # New option for AE warmup
  adv_loss_weight: 0.5  
  adv_update_factor: 1      
  normalize_input: true
  use_adversarial: true
  lr_scheduling: true
  gradient_clip_val: 10.0
  soft_loss_weight: 0.5
  ae_init_ckpt_path: null   # Optional: path to a full Lightning .ckpt to initialize only ae.* weights
  ae_init_strict: true      # If false, allow partial AE weight loading


# Training options:
trainer:
  max_epochs: 200
  val_check_interval: 1.0 # Must be >= 1 for iterable-type dataset
  log_every_n_steps: 10    
  sync_batchnorm: True
  accelerator: "gpu"
  devices: "auto"
  deterministic: False
  detect_anomaly: True

# Tensorboard options:
tensorboard:
  save_dir: "/project2/shrikann_35/nmehlman/logs/private_codecs/tensorboard"
  name: "debug"
  version: null     # Automatic versioning if set to null (recommended)

