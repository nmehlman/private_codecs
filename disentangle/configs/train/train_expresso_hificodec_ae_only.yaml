

# Basic training configuration for Expresso with Hificodec features

---
random_seed: 42
ckpt_path: null
gpus: "0"
dataset_name: "expresso"
codec_name: "hificodec"
input_type: "quantized_embedding"

# Dataset options:
dataset:
  dataset_path: "/project2/shrikann_35/DATA/expresso/codec_feats/"
  codec: "hificodec"
  emotion_model: "wavlm"

# Dataloader options:
dataloader:
  batch_size: 64
  num_workers: 4

# Model options:
lightning:
  codec_dim: 512
  latent_dim: 128
  enc_channels: [256, 256]
  dec_channels: [128, 128]
  conditioning_dim: 256
  conditioning_dropout: 0.0
  num_emotion_classes: 9
  learning_rate: 0.002
  weight_decay: 0
  normalize_input: true
  use_adversarial: false
  lr_scheduling: true


# Training options:
trainer:
  max_epochs: 500
  val_check_interval: 1.0 # Must be >= 1 for iterable-type dataset
  log_every_n_steps: 10    
  sync_batchnorm: True
  accelerator: "gpu"
  devices: "auto"
  deterministic: False
  detect_anomaly: True


# Tensorboard options:
tensorboard:
  save_dir: "/project2/shrikann_35/nmehlman/logs/private_codecs/tensorboard"
  name: "first-hificodec-run"
  version: null     # Automatic versioning if set to null (recommended)

